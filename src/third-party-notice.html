<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Third Party Notice - 수학 공책</title>

  <link href="assets/stylesheets/style.css" rel="stylesheet" type="text/css"/>

</head>
<body>
  <!-- BUILD-PLACEHOLDER:HEADER -->

  
  <div id="content"></div>

  <script type="module">
    import { parse } from 'marked'
    import DOMPurify from 'dompurify';

    async function loadNotice() {
      try {
        const response = await fetch('third-party-notice.md');
        if (!response.ok) throw new Error('Failed to load license file');

        const markdown = await response.text();
        const rawHtml = parse(markdown); 
        const cleanHtml = DOMPurify.sanitize(rawHtml);
        
        document.getElementById('content').innerHTML = cleanHtml;
      } catch {
        document.getElementById('content').innerHTML = '<p>Error on loading notices. Please check the <a href="">GitHub repository</a>.</p>';
      }
    }

    loadNotice();
  </script>
</body>
</html>
